<body>
  <nav>
    <ul class="navbar">
      <li><a href="welcome.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>

  <header class="hero">
    <h1>Energy-Based Planning</h1>
    <p>Work with your energy, not against it.</p>
  </header>

  <main class="container">

    <!-- ENERGY SELECT -->
    <section class="card">
      <h2>How are you feeling?</h2>

      <div class="energy-options">
        <button class="energy-btn" data-energy="tired">😴 Tired</button>
        <button class="energy-btn" data-energy="okay">😐 Okay</button>
        <button class="energy-btn" data-energy="focused">⚡ Focused</button>
      </div>
    </section>

    <!-- TASK OUTPUT -->
    <section class="card">
      <h2>Suggested Tasks</h2>
      <div id="taskContainer" class="task-container">
        <p>Select your energy level to see tasks.</p>
      </div>
    </section>

  </main>

  <script src="planning.js"></script>
</body>
