<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - LADA</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="settings.css">
</head>
<body>

  <!-- Navbar -->
  <nav>
    <ul class="navbar">
      <li><a href="welcome.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="calendar.html">Calendar</a></li>
      <li><a href="https://74a77ef1-efae-4ff1-a48f-8236860fc5ba-00-33p5gtno19pp0.picard.replit.dev/">Notes</a></li>
      <li><a href="planning.html">Planning</a></li>
      <li><a href="settings.html" class="active">Settings</a></li>
      <li class="logout"><a href="login.html">Log Out</a></li> 
    </ul>
  </nav>

  <!-- Settings Header -->
  <header class="header">
    <h1>Settings</h1>
    <h2>Customize your experience</h2>
  </header>

  <!-- Settings Sections -->
  <section class="settings-section">

    <!-- Account -->
    <div class="settings-card">
      <h2>Account</h2>
      <div class="setting-item">
        <label for="profile-name">Profile Name:</label>
        <input type="text" id="profile-name" value="RAMHACKER">
      </div>
      <div class="setting-item">
        <label for="email">Email:</label>
        <input type="email" id="email" value="user@example.com">
      </div>
      <div class="setting-item">
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Change password">
      </div>
      <button id="update-account-btn">Update Account</button>
    </div>

    <!-- Preferences -->
    <div class="settings-card">
      <h2>Preferences</h2>
      <div class="setting-item">
        <label for="theme">Theme:</label>
        <select id="theme">
          <option>Light</option>
          <option>Dark</option>
        </select>
      </div>
      <div class="setting-item">
        <label>Notifications:</label>
        <input type="checkbox" id="notifications" checked>
      </div>
      <div class="setting-item">
        <label for="language">Language:</label>
        <select id="language">
          <option>English</option>
          <option>Spanish</option>
          <option>French</option>
        </select>
      </div>
    </div>

    <!-- Privacy & Security -->
    <div class="settings-card">
      <h2>Privacy & Security</h2>
      <div class="setting-item">
        <button id="export-data-btn">Export Data</button>
      </div>
      <div class="setting-item">
        <button id="delete-account-btn">Delete Account</button>
      </div>
    </div>

    <!-- Log Out -->
    <div class="settings-card logout-card">
      <button id="logout-btn">🚫 Log Out</button>
    </div>

  </section>

  <script src="settings.js"></script>
</body>
</html>
